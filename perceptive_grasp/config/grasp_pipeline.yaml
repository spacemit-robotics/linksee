# perceptive grasp 发布配置
# 仅保留部署必填项和现场常用调节项，完整说明见 ../docs/grasp_config.md。

# 立体相机与目标检测
camera:
  type: "spacemit_las2"  # realsense 或 spacemit_las2

  realsense:
    width: 640
    height: 480
    fps: 30
    motion_flush_frames: 16
    align_depth: true
    depth_filter:
      spatial: true
      temporal: true
      hole_filling: true

  spacemit_las2:
    video_device: "/dev/v4l/by-id/usb-DECXIN_DECXIN_Camera_01.00.00-video-index0"
    model_path: "~/las2_runtime/models/LAS2_M_256x320.fp16.iofp32.corr_func_nhwc.gelu.onnx"
    calib_path: "~/las2_runtime/config/matlab_stereo_opencv.json"
    core_count: 1
    core_affinity: "8"
    depth:
      min_m: 0.05
      max_m: 2.0

detection:
  config_path: yolov8_seg.yaml
  target_labels: []  # 空列表表示检测全部 coco 类别
  min_confidence: 0.4
  min_area: 1000
  stable_frames: 1

# 手眼标定结果
calibration:
  T_base_camera:
    translation: [-0.019765, 0.048938, 0.312118]
    rotation: [-2.126969, -0.007183, -1.598329]

# 抓取策略
grasp:
  approach_height: 0.10
  grasp_depth: 0.01
  gripper_offset: 0.0
  grasp_point_x_ratio: 0.5
  gripper_open: 0.6
  gripper_effort: 0.8
  gripper_hold_load_threshold: 100.0
  gripper_empty_position_margin: 0.03
  gripper_timeout_ms: 3000
  workspace:
    x_min: 0.0
    x_max: 0.5
    y_min: -0.3
    y_max: 0.3
    z_min: 0.0
    z_max: 0.20

orientation:
  enabled: true
  aspect_ratio_threshold: 1.2

# 机械臂与放置姿态
manipulator:
  uart_device: "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A057974-if00"
  urdf_path: "../urdf/so101.urdf"
  move_speed: 1.0
  line_speed: 0.5
  home_joints: [1.816, -1.850, 1.639, 1.147, 0.189]
  observe_joints: [1.759, 0.050, -0.217, 1.606, 0.015]

place:
  place_joints: [-1.636, 0.087, -0.140, 1.389, 0.033]
  release_open: 0.5

# 底盘辅助对齐
mobile_base:
  enabled: true
  dev_path: "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5958002008-if00"
  target_x: 0.275
  x_tolerance: 0.045
  y_tolerance: 0.15
  max_step_m: 0.12
  linear_speed: 0.20
  angular_speed: 1.2

# 语音交互
voice:
  trigger_words: ["抓", "拿", "pick", "grab"]
  cancel_words: ["停止", "停", "取消", "别抓", "不要抓", "stop", "cancel"]
  home_words: ["结束", "待命", "休息", "回家", "回home", "回到home", "回初始", "回到初始", "end", "home"]
  split_command_timeout_ms: 5000

  asr:
    device: 1
    rate: 16000
    channels: 1
    vad_trigger_threshold: 0.4
    vad_stop_threshold: 0.3
    vad_min_speech_duration_ms: 100

  tts:
    engine: "matcha:zh"
    playback_device: 1
    playback_rate: 48000
    channels: 1
    speed: 1.0
    volume: 80
    mixer_volume: 80
    speak_all_states: false

  target_aliases:
    香蕉: "banana"
    苹果: "apple"
    红苹果: "apple"
    青苹果: "apple"
    橙子: "orange"
    桔子: "orange"
    橘子: "orange"
    橙: "orange"
    胡萝卜: "carrot"
    萝卜: "carrot"
    红萝卜: "carrot"
    胡罗卜: "carrot"
    中罗: "carrot"
    走罗: "carrot"
    瓶子: "bottle"
    水瓶: "bottle"
    矿泉水: "bottle"
    杯子: "cup"
    水杯: "cup"
    碗: "bowl"
    勺子: "spoon"
    叉子: "fork"
    剪刀: "scissors"
