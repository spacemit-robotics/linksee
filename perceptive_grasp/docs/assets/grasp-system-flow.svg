<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">perceptive grasp pipeline 链路</title>
  <desc id="desc">立体相机提供彩色图和深度信息，spacemit_vision_service 完成目标分割和定位，抓取规划生成顶抓位姿，Linksee 机械臂执行抓取和放置。asr 向 pipeline 输入语音命令，pipeline 通过 tts 播报状态。目标超出舒适抓取区时，底盘辅助对齐，停车后重新感知和规划。</desc>

  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#059669"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .heading { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 17px; font-weight: 700; fill: #0f172a; }
      .node-title { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 13px; fill: #475569; }
      .caption { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 12px; font-weight: 600; fill: #64748b; }
      .small-title { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .small-text { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 11px; fill: #64748b; }
      .step { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 11px; font-weight: 700; fill: #ffffff; }
      .arrow { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="540" fill="#ffffff"/>

  <!-- Voice interaction -->
  <text x="750" y="18" text-anchor="middle" class="caption">语音交互</text>
  <g filter="url(#shadow)">
    <rect x="635" y="28" width="105" height="70" rx="8" fill="#f8fafc" stroke="#bfdbfe"/>
    <rect x="760" y="28" width="105" height="70" rx="8" fill="#f8fafc" stroke="#bbf7d0"/>
  </g>

  <!-- asr microphone icon -->
  <g transform="translate(674 39)" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="8" y="1" width="10" height="18" rx="5"/>
    <path d="M4 14a9 9 0 0 0 18 0M13 23v4M9 27h8"/>
  </g>
  <text x="687" y="88" text-anchor="middle" class="small-title">asr</text>

  <!-- tts speaker icon -->
  <g transform="translate(796 43)" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 8v10h7l8 6V2L8 8H1z"/>
    <path d="M21 8a8 8 0 0 1 0 10M25 4a13 13 0 0 1 0 18"/>
  </g>
  <text x="812" y="88" text-anchor="middle" class="small-title">tts</text>

  <path class="arrow" d="M687 110V117" stroke="#2563eb"/>
  <path d="M687 123l-6-10h12z" fill="#2563eb"/>
  <path class="arrow" d="M812 123V116" stroke="#059669"/>
  <path d="M812 110l-6 10h12z" fill="#059669"/>

  <!-- Stage panels -->
  <g filter="url(#shadow)">
    <rect x="30" y="135" width="215" height="240" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
    <rect x="310" y="135" width="250" height="240" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="1.5"/>
    <rect x="625" y="135" width="250" height="240" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="940" y="135" width="230" height="240" rx="8" fill="#ffffff" stroke="#c2410c" stroke-width="1.5"/>
  </g>

  <!-- Panel headers -->
  <path d="M38 135H237a8 8 0 0 1 8 8v40H30v-40a8 8 0 0 1 8-8z" fill="#f8fafc"/>
  <path d="M318 135H552a8 8 0 0 1 8 8v40H310v-40a8 8 0 0 1 8-8z" fill="#f0fdf4"/>
  <path d="M633 135H867a8 8 0 0 1 8 8v40H625v-40a8 8 0 0 1 8-8z" fill="#eff6ff"/>
  <path d="M948 135H1162a8 8 0 0 1 8 8v40H940v-40a8 8 0 0 1 8-8z" fill="#fff7ed"/>
  <line x1="30" y1="183" x2="245" y2="183" stroke="#cbd5e1"/>
  <line x1="310" y1="183" x2="560" y2="183" stroke="#bbf7d0"/>
  <line x1="625" y1="183" x2="875" y2="183" stroke="#bfdbfe"/>
  <line x1="940" y1="183" x2="1170" y2="183" stroke="#fed7aa"/>

  <!-- Step labels -->
  <circle cx="55" cy="159" r="12" fill="#64748b"/>
  <circle cx="335" cy="159" r="12" fill="#15803d"/>
  <circle cx="650" cy="159" r="12" fill="#2563eb"/>
  <circle cx="965" cy="159" r="12" fill="#c2410c"/>
  <text x="55" y="163" text-anchor="middle" class="step">01</text>
  <text x="335" y="163" text-anchor="middle" class="step">02</text>
  <text x="650" y="163" text-anchor="middle" class="step">03</text>
  <text x="965" y="163" text-anchor="middle" class="step">04</text>
  <text x="137" y="165" text-anchor="middle" class="heading">感知输入</text>
  <text x="435" y="165" text-anchor="middle" class="heading">目标感知</text>
  <text x="750" y="165" text-anchor="middle" class="heading">抓取规划</text>
  <text x="1055" y="165" text-anchor="middle" class="heading">机械臂执行</text>

  <!-- Input node -->
  <rect x="50" y="205" width="175" height="140" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <g transform="translate(105 222)" fill="none" stroke="#475569" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="8" width="66" height="38" rx="6"/>
    <circle cx="23" cy="27" r="9"/>
    <circle cx="48" cy="27" r="9"/>
    <path d="M10 8l6-8h34l6 8M12 51h42"/>
  </g>
  <text x="137" y="300" text-anchor="middle" class="node-title">立体相机</text>
  <text x="137" y="325" text-anchor="middle" class="body">彩色图 + 深度信息</text>

  <!-- Vision node -->
  <rect x="330" y="205" width="210" height="140" rx="8" fill="#f7fef8" stroke="#86efac"/>
  <g transform="translate(404 218)" fill="none" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="62" height="50" rx="5"/>
    <path d="M8 17V8h11M43 8h11v9M54 33v9H43M19 42H8v-9"/>
    <path d="M22 19h19v17H22z" fill="#bbf7d0" stroke="none"/>
    <circle cx="31" cy="27" r="4" fill="#15803d" stroke="none"/>
  </g>
  <text x="435" y="295" text-anchor="middle" class="node-title">yolov8-seg</text>
  <text x="435" y="319" text-anchor="middle" class="body">类别 / 检测框 / mask</text>

  <!-- Planning node -->
  <rect x="645" y="205" width="210" height="140" rx="8" fill="#f8fbff" stroke="#93c5fd"/>
  <g transform="translate(718 217)" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="32" cy="26" r="23"/>
    <circle cx="32" cy="26" r="8"/>
    <path d="M32 0v12M32 40v12M6 26h12M46 26h12"/>
    <circle cx="32" cy="26" r="3" fill="#2563eb" stroke="none"/>
  </g>
  <text x="750" y="295" text-anchor="middle" class="node-title">三维定位与顶抓</text>
  <text x="750" y="319" text-anchor="middle" class="body">坐标变换 / 抓取位姿</text>

  <!-- Arm execution node -->
  <rect x="960" y="205" width="190" height="140" rx="8" fill="#fffaf5" stroke="#fdba74"/>
  <g transform="translate(1018 216)" fill="none" stroke="#c2410c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 54h62M14 54v-8h18v8M23 46V29l18-14 14 12"/>
    <circle cx="23" cy="29" r="5" fill="#ffedd5"/>
    <circle cx="41" cy="15" r="5" fill="#ffedd5"/>
    <circle cx="55" cy="27" r="5" fill="#ffedd5"/>
    <path d="M59 29l10 5M59 29l8-7"/>
  </g>
  <text x="1055" y="295" text-anchor="middle" class="node-title">Linksee 机械臂</text>
  <text x="1055" y="319" text-anchor="middle" class="body">抓取 / 抬升 / 放置</text>

  <!-- Main data flow -->
  <path class="arrow" d="M257 270H288" stroke="#334155"/>
  <path d="M298 270l-10-6v12z" fill="#334155"/>
  <path class="arrow" d="M572 270H603" stroke="#334155"/>
  <path d="M613 270l-10-6v12z" fill="#334155"/>
  <path class="arrow" d="M887 270H918" stroke="#334155"/>
  <path d="M928 270l-10-6v12z" fill="#334155"/>
  <text x="277" y="251" text-anchor="middle" class="caption">彩色 + 深度</text>
  <text x="592" y="251" text-anchor="middle" class="caption">检测 + 深度</text>
  <text x="907" y="251" text-anchor="middle" class="caption">抓取位姿</text>

  <!-- Chassis alignment loop -->
  <g filter="url(#shadow)">
    <rect x="625" y="435" width="250" height="75" rx="8" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  </g>
  <g transform="translate(653 453)" fill="none" stroke="#0f766e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="54" height="28" rx="6"/>
    <path d="M10 0l8-9h18l8 9M12 28v7M42 28v7"/>
    <circle cx="12" cy="35" r="5" fill="#ccfbf1"/>
    <circle cx="42" cy="35" r="5" fill="#ccfbf1"/>
  </g>
  <text x="785" y="464" text-anchor="middle" class="node-title">底盘辅助对齐</text>
  <text x="785" y="488" text-anchor="middle" class="body">前后移动 / 原地转向</text>

  <path class="arrow" d="M750 387V413" stroke="#0f766e"/>
  <path d="M750 423l-6-10h12z" fill="#0f766e"/>
  <text x="882" y="408" text-anchor="end" class="caption">目标超出舒适抓取区</text>
  <path class="arrow" d="M613 472H137V397" stroke="#0f766e"/>
  <path d="M137 387l-6 10h12z" fill="#0f766e"/>
  <text x="375" y="496" text-anchor="middle" class="caption">停车后重新感知与规划</text>
</svg>
