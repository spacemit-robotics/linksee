<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180" role="img" aria-labelledby="title desc">
  <title id="title">Perceptive Grasp 语音控制链路</title>
  <desc id="desc">麦克风语音进入本地语音桥，语音桥通过 voice-stdin 控制抓取程序，抓取程序通过 status-stdout 返回状态，语音桥再通过扬声器播报。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#059669"/>
    </marker>
    <style>
      .card { fill: #f8fafc; stroke: #dbeafe; }
      .card-green { fill: #f8fafc; stroke: #dcfce7; }
      .label { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .hint { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 12px; fill: #64748b; }
      .chip { font-family: Arial, 'Noto Sans CJK SC', sans-serif; font-size: 11px; font-weight: 700; fill: #475569; }
    </style>
  </defs>

  <rect width="900" height="180" fill="#ffffff"/>

  <g>
    <rect class="card" x="78" y="22" width="112" height="64" rx="12"/>
    <rect class="card-green" x="78" y="98" width="112" height="64" rx="12"/>
    <rect class="card" x="340" y="26" width="240" height="128" rx="16"/>
    <rect class="card-green" x="730" y="58" width="124" height="64" rx="14"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M214 54 H316" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
    <path d="M604 76 H706" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
    <path d="M706 104 H604" stroke="#059669" stroke-width="2.2" marker-end="url(#arrow-green)"/>
    <path d="M316 130 H214" stroke="#059669" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  </g>

  <text x="265" y="42" text-anchor="middle" class="hint">语音命令</text>
  <text x="655" y="63" text-anchor="middle" class="hint">voice-stdin</text>
  <text x="655" y="124" text-anchor="middle" class="hint">status-stdout</text>
  <text x="265" y="153" text-anchor="middle" class="hint">TTS 播报</text>

  <g transform="translate(122 29)" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="3" width="6" height="11" rx="3"/>
    <path d="M5 11a7 7 0 0 0 14 0"/>
    <path d="M12 18v3"/>
    <path d="M9 21h6"/>
  </g>
  <text x="134" y="76" text-anchor="middle" class="label">麦克风</text>

  <g transform="translate(122 105)" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9v6h4l5 4V5L8 9H4z"/>
    <path d="M17 9a5 5 0 0 1 0 6"/>
    <path d="M20 6a9 9 0 0 1 0 12"/>
  </g>
  <text x="134" y="152" text-anchor="middle" class="label">扬声器</text>

  <g transform="translate(448 43)" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="6" width="18" height="12" rx="4"/>
    <circle cx="8" cy="12" r="1.2" fill="#2563eb" stroke="none"/>
    <circle cx="12" cy="12" r="1.2" fill="#2563eb" stroke="none"/>
    <circle cx="16" cy="12" r="1.2" fill="#2563eb" stroke="none"/>
  </g>
  <text x="460" y="92" text-anchor="middle" class="label">local_voice_bridge.py</text>
  <g>
    <rect x="382" y="113" width="46" height="20" rx="10" fill="#eef2ff"/>
    <rect x="437" y="113" width="46" height="20" rx="10" fill="#ecfeff"/>
    <rect x="492" y="113" width="46" height="20" rx="10" fill="#f0fdf4"/>
    <text x="405" y="127" text-anchor="middle" class="chip">VAD</text>
    <text x="460" y="127" text-anchor="middle" class="chip">ASR</text>
    <text x="515" y="127" text-anchor="middle" class="chip">TTS</text>
  </g>

  <g transform="translate(780 66)" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="14" rx="3"/>
    <path d="M8 10l3 2-3 2"/>
    <path d="M14 14h3"/>
  </g>
  <text x="792" y="113" text-anchor="middle" class="label">抓取程序</text>
</svg>
